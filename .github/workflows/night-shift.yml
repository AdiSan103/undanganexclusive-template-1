name: 🌙 Pasukan Malam (Knowledge Base Builder)

on:
  schedule:
    # Berjalan jam 18.00 WITA (10.00 UTC) pada tanggal 23 Juli
    - cron: '0 10 23 7 *'
  workflow_dispatch: 

jobs:
  night-shift-build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Tarik Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment 
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🤖 Bangunkan cmdc (Membaca Knowledge Base)
        env:
          COMMAND_CODE_API_KEY: ${{ secrets.COMMAND_CODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g command-code

          # script menyediakan pseudo-TTY untuk cmdc (butuh di CI karena cmdc hanya
          # mendukung input interaktif, tidak ada flag --no-interactive / --ci / --headless)
          # --auto-accept untuk skip semua prompt konfirmasi
          script -q -c 'cmdc --auto-accept "Tolong baca dan analisis file knowledge-base.md. Bangun struktur proyek dan tulis kodenya dari awal sesuai dengan spesifikasi, fitur, dan tech stack yang ada di dokumen tersebut."' /dev/null

      - name: 📦 Commit & Push Perubahan
        run: |
          git config user.name "🤖 CommandCodeBot"
          git config user.email "bot@commandcode.ai"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "feat: automated build from knowledge-base.md

          Generated by Command Code night-shift workflow.

          Co-authored-by: CommandCodeBot <noreply@commandcode.ai>"
            git push origin main
          else
            echo "✅ Tidak ada perubahan, skip commit."
          fi
